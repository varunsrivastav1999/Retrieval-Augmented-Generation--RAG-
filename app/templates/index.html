<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask RAG</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="/static/js/marked.min.js"></script>
    <style>
        :root {
            /* Dark Mode variables */
            --bg-color: #131314;
            --text-color: #e3e3e3;
            --input-bg: #1e1f20;
            --input-border: #444746;
            --placeholder-color: #c4c7c5;
            --accent-color: #a8c7fa;
            --info-bg: #282a2c;
            --radial-gradient: radial-gradient(circle at center, #1b2131 0%, #131314 60%);
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --text-color: #1f1f1f;
            --input-bg: #ffffff;
            --input-border: #e0e0e0;
            --placeholder-color: #444746;
            --accent-color: #0b57d0;
            --info-bg: #f8f9fa;
            --radial-gradient: radial-gradient(circle at center, #e3f0fe 0%, #ffffff 50%, #ffffff 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            background-image: var(--radial-gradient);
            color: var(--text-color);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Nav */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            flex-shrink: 0;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            border-radius: 50%;
        }
        .theme-toggle:hover {
            background: var(--input-bg);
        }

        /* Main Container */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            min-height: 0;
        }

        .main-container.chatting {
            justify-content: flex-end;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 1s ease;
            width: 100%;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            margin-bottom: 30px;
            background: -webkit-linear-gradient(45deg, #a8c7fa, #d3e3fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        [data-theme="light"] .hero h1 {
            background: none;
            -webkit-text-fill-color: var(--text-color);
            color: var(--text-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modern Spinner */
        .spinner {
            animation: rotate 2s linear infinite;
            width: 20px;
            height: 20px;
        }
        .spinner .path {
            stroke: currentColor;
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        @keyframes dash {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }

        /* Chat Area */
        .chat-area {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 90%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
        }
        
        @media (max-width: 600px) {
            .message-bubble { max-width: 100%; font-size: 1rem; }
            .top-nav { padding: 10px; }
            .hero h1 { margin-bottom: 20px; }
        }

        .message-row.user .message-bubble {
            background-color: var(--input-bg);
            border-bottom-right-radius: 4px;
        }

        .message-row.ai {
            justify-content: flex-start;
            position: relative;
        }

        .message-row.ai .message-bubble {
            background: transparent;
            padding: 10px 0;
            width: 100%;
        }

        /* Input Area */
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            margin: 0 auto;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .input-pill {
            background-color: var(--input-bg);
            border-radius: 32px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .input-pill .plus-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            cursor: pointer;
            margin-right: 15px;
            transition: all 0.2s;
        }
        .input-pill .plus-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .input-pill input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            padding: 10px 0;
        }

        .input-pill input::placeholder {
            color: var(--placeholder-color);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .send-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--text-color);
            color: var(--bg-color);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .send-icon:hover {
            transform: scale(1.05);
        }
        .send-icon svg { width: 20px; height: 20px; }

        /* Info Hover Icon */
        .info-container {
            position: absolute;
            top: 10px;
            right: 0;
            cursor: pointer;
        }

        .info-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: var(--placeholder-color);
            border: 1px solid var(--input-border);
        }
        
        .typing-loader {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--placeholder-color);
            padding: 10px 0;
            animation: fadeIn 0.3s ease;
        }

        .info-panel {
            position: absolute;
            top: 40px;
            right: 0;
            width: 350px;
            background: var(--info-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
            font-size: 0.85rem;
            color: var(--text-color);
        }

        .info-container:hover .info-panel {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .info-panel h4 {
            margin-bottom: 10px;
            color: var(--accent-color);
        }
        .info-panel p {
            margin-bottom: 5px;
            color: var(--placeholder-color);
        }

        /* Loader */
        .typing-indicator {
            display: none;
            padding: 10px 0;
            color: var(--placeholder-color);
            font-size: 0.9rem;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin-right: 3px;
            animation: pulse 1s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.44s; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Markdown Styles */
        .markdown-body pre {
            background: var(--info-bg);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid var(--input-border);
        }
        .markdown-body code {
            font-family: monospace;
            background: var(--info-bg);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .markdown-body a { color: var(--accent-color); }
        .markdown-body ul, .markdown-body ol { margin-left: 20px; margin-bottom: 10px; }
        .markdown-body p { margin-bottom: 10px; }

        /* Health Indicator */
        .health-indicator-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .health-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #6b7280; /* default gray */
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }

        .health-dot.ok { background-color: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.4); }
        .health-dot.warning { background-color: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.4); }
        .health-dot.error { background-color: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }

        .health-panel {
            position: absolute;
            bottom: 30px;
            right: -20px;
            width: 220px;
            background: var(--info-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 200;
            font-size: 0.85rem;
            color: var(--text-color);
        }

        .health-indicator-wrapper:hover .health-panel {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .health-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .health-item span:first-child { color: var(--placeholder-color); }
        .health-item span.status-ok { color: #10b981; }
        .health-item span.status-warn { color: #f59e0b; }
        .health-item span.status-err { color: #ef4444; }
    </style>
</head>
<body data-theme="dark">
    <script>
        // Auto-detect OS theme preference on load
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.body.setAttribute('data-theme', 'light');
        }
    </script>
    <div class="top-nav">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
            <script>document.write(document.body.getAttribute('data-theme') === 'light' ? '🌙' : '☀️');</script>
        </button>
    </div>

    <div class="main-container">
        
        <div class="hero" id="heroArea">
            <h1>Ready when you are</h1>
        </div>

        <div class="chat-area" id="chatArea">
            <!-- Messages go here -->
        </div>

        <div class="input-wrapper">
            <div class="input-pill">
                <div class="plus-icon" onclick="document.getElementById('fileInput').click()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                    </svg>
                </div>
                <input type="text" id="queryInput" placeholder="Ask RAG" onkeypress="if(event.key === 'Enter') askQuery()">
                <div class="input-actions">
                    <div class="health-indicator-wrapper">
                        <div class="health-dot" id="sysHealthDot"></div>
                        <div class="health-panel">
                            <h4 style="margin-bottom:8px; color: var(--accent-color);">System Health</h4>
                            <div class="health-item"><span>Database:</span> <span id="h_db">...</span></div>
                            <div class="health-item"><span>Redis:</span> <span id="h_redis">...</span></div>
                            <div class="health-item"><span>Ollama:</span> <span id="h_ollama">...</span></div>
                            <div class="health-item"><span>Models:</span> <span id="h_models">...</span></div>
                        </div>
                    </div>
                    <div class="send-icon" onclick="askQuery()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
            }
        }

        async function askQuery() {
            const input = document.getElementById('queryInput');
            const query = input.value.trim();
            if (!query) return;

            input.value = '';
            
            // Hide hero, show chat, shift layout
            document.getElementById('heroArea').style.display = 'none';
            document.querySelector('.main-container').classList.add('chatting');
            const chatArea = document.getElementById('chatArea');
            chatArea.style.display = 'flex';

            // Append user message
            const userHtml = `
                <div class="message-row user">
                    <div class="message-bubble">${query}</div>
                </div>
            `;
            chatArea.insertAdjacentHTML('beforeend', userHtml);

            // Create AI response container
            const aiId = 'ai_' + Date.now();
            const aiRow = document.createElement('div');
            aiRow.className = 'message-row ai';
            aiRow.innerHTML = `
                <div class="ai-avatar" style="margin-right: 15px; color: var(--accent-color); margin-top: 10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.0001 22C12.0001 16.4772 7.52292 12 2.00006 12C7.52292 12 12.0001 7.52285 12.0001 2C12.0001 7.52285 16.4772 12 21.9999 12C16.4772 12 12.0001 16.4772 12.0001 22Z"/>
                    </svg>
                </div>
                <div class="message-bubble">
                    <div class="markdown-body" id="text_${aiId}"></div>
                </div>
                
                <div class="info-container" id="info_${aiId}" style="display:none;">
                    <div class="info-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 0 24 24" width="18px" fill="currentColor"><path d="M0 0h24v24H0z" fill="none"/><path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                    </div>
                    <div class="info-panel" id="panel_${aiId}">
                        <h4>RAG Pipeline Details</h4>
                        <p id="latency_${aiId}">Latency: --</p>
                        <p id="grounding_${aiId}">Grounding: --</p>
                        <p id="sources_${aiId}">Sources: --</p>
                    </div>
                </div>
            `;
            chatArea.appendChild(aiRow);
            chatArea.scrollTop = chatArea.scrollHeight;

            const loader = document.createElement('div');
            loader.className = 'typing-loader';
            loader.innerHTML = `<svg class="spinner" viewBox="0 0 50 50"><circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle></svg> Thinking...`;
            aiRow.querySelector('.message-bubble').prepend(loader);
            
            const answerBox = document.getElementById(`text_${aiId}`);
            
            try {
                const response = await fetch('/api/v1/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, stream: true })
                });

                if (!response.ok) throw new Error("Request failed");

                loader.remove();

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullAnswer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.token) {
                                    fullAnswer += data.token;
                                    answerBox.innerHTML = marked.parse(fullAnswer);
                                    chatArea.scrollTop = chatArea.scrollHeight;
                                }
                                if (data.done) {
                                    // Populate Info Panel
                                    document.getElementById(`info_${aiId}`).style.display = 'block';
                                    const score = data.grounding?.score ? (data.grounding.score * 100).toFixed(0) : 0;
                                    document.getElementById(`grounding_${aiId}`).innerText = `Grounding: ${score}% | Conf: ${data.verification?.confidence || 'N/A'}`;
                                    document.getElementById(`sources_${aiId}`).innerText = `Sources used: ${data.sources?.length || 0}`;
                                    if (data.latency_ms) {
                                        document.getElementById(`latency_${aiId}`).innerText = `Latency: ${data.latency_ms}ms`;
                                    }
                                }
                                if (data.error) {
                                    answerBox.innerHTML += `<div style="color:#ef4444; margin-top:1rem;">Error: ${data.error}</div>`;
                                }
                            } catch (e) {
                                console.error("Error parsing stream chunk", e);
                            }
                        }
                    }
                }
            } catch (e) {
                loader.remove();
                answerBox.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`;
            }
        }

        async function uploadFiles() {
            const input = document.getElementById('fileInput');
            if (!input.files || input.files.length === 0) return;

            const plusBtn = document.querySelector('.plus-icon');
            const originalPlus = plusBtn.innerHTML;
            plusBtn.innerHTML = `<svg class="spinner" viewBox="0 0 50 50"><circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle></svg>`;
            plusBtn.style.pointerEvents = 'none';

            let allSuccess = true;

            try {
                const uploadPromises = Array.from(input.files).map(f => {
                    const formData = new FormData();
                    formData.append("file", f); // Matches backend `file: UploadFile`
                    return fetch('/api/v1/upload', { method: 'POST', body: formData });
                });
                
                const responses = await Promise.all(uploadPromises);
                responses.forEach(res => {
                    if (!res.ok) allSuccess = false;
                });

                if (allSuccess) {
                    plusBtn.innerHTML = '✅';
                } else {
                    plusBtn.innerHTML = '⚠️';
                }
            } catch (e) {
                plusBtn.innerHTML = '❌';
            } finally {
                setTimeout(() => {
                    plusBtn.innerHTML = originalPlus;
                    plusBtn.style.pointerEvents = 'auto';
                    input.value = '';
                }, 3000);
            }
        }

        async function checkHealth() {
            try {
                const res = await fetch('/health/ready');
                const data = await res.json();
                const checks = data.checks || {};
                
                let issues = 0;
                let fails = 0;
                
                const updateStatus = (id, val) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    if (val === 'ok' || val === 'ready') {
                        el.textContent = 'OK';
                        el.className = 'status-ok';
                    } else if (val && val.startsWith('degraded')) {
                        el.textContent = 'WARN';
                        el.className = 'status-warn';
                        issues++;
                    } else if (val) {
                        el.textContent = 'ERR';
                        el.className = 'status-err';
                        fails++;
                    } else {
                        el.textContent = '--';
                    }
                };

                updateStatus('h_db', checks.database);
                updateStatus('h_redis', checks.redis);
                updateStatus('h_ollama', checks.ollama);
                updateStatus('h_models', checks.models);

                const dot = document.getElementById('sysHealthDot');
                dot.className = 'health-dot';
                if (fails > 0 || data.status !== 'ok') {
                    dot.classList.add('error');
                } else if (issues > 0) {
                    dot.classList.add('warning');
                } else {
                    dot.classList.add('ok');
                }
            } catch (e) {
                const dot = document.getElementById('sysHealthDot');
                dot.className = 'health-dot error';
                ['h_db', 'h_redis', 'h_ollama', 'h_models'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.textContent = 'DISC'; el.className = 'status-err'; }
                });
            }
        }

        // Run once on load and every 10 seconds
        checkHealth();
        setInterval(checkHealth, 10000);
    </script>
    <input type="file" id="fileInput" multiple style="display: none;" onchange="uploadFiles()">
</body>
</html>
