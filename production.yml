volumes:
  prod_ollama_data: {}
  prod_huggingface_cache: {}
  prod_neo4j_data: {}

services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_prod
    container_name: itips_rag_prod
    depends_on:
      - ollama
      - redis
      - neo4j
    volumes:
      - .:/app:z
      - /your/new/absolute/path/to/external_media:/media
      - prod_huggingface_cache:/models/huggingface
    environment:
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface/sentence-transformers
      - HF_HUB_CACHE=/models/huggingface/hub
    ports:
      - "1000:1000"
    env_file:
      - ./.envs/.production/.rag
      - ./.envs/.production/.postgres
      - ./.envs/.production/.redis
      - ./.envs/.production/.neo4j
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: uvicorn app.main:app --host 0.0.0.0 --port 1000 --workers 4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_rag_prod
    volumes:
      - prod_ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama_rag_prod_pull
    depends_on:
      - ollama
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - .:/app:ro
    command: -c "sleep 10 && (ollama pull llama3 || echo 'Pull skipped') && ollama create itips-brain -f /app/Modelfile && echo 'itips-brain ready'"

  redis:
    image: redis:7-alpine
    container_name: itips_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-mysecurepassword}

  neo4j:
    image: neo4j:5.17.0
    container_name: neo4j_rag_prod
    volumes:
      - prod_neo4j_data:/data:z
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-rag_password}
    ports:
      - "7474:7474"
      - "7687:7687"
