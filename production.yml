# ==============================================================================
# Enterprise Level RAG — Production Docker Compose (v3.0)
# ==============================================================================
# Architecture:
#   - rag_api:  FastAPI microservice (4 workers, GPU-accelerated)
#   - postgres: pgvector 15 with HNSW indexes for vector search
#   - redis:    Redis 7 with password auth for semantic cache + job queue
#   - ollama:   Ollama LLM server with GPU passthrough
#   - neo4j:    Neo4j 5 knowledge graph for entity relationships
#   - models:   One-shot model pre-loader / puller
#   - backup:   Scheduled pg_dump + neo4j dump to S3-compatible storage
# ==============================================================================

volumes:
  prod_postgres_data:
    driver: local
  prod_qdrant_data:
    driver: local
  prod_redis_data:
    driver: local
  prod_ollama_data:
    driver: local
  prod_neo4j_data:
    driver: local
  prod_media:
    driver: local
  prod_backup_data:
    driver: local

networks:
  rag_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # ============================================================================
  # RAG API — FastAPI Microservice
  # ============================================================================
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_prod:latest
    pull_policy: if_not_present
    container_name: itips_rag_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      models:
        condition: service_completed_successfully
    volumes:
      - prod_media:/media
      - type: bind
        source: ./
        target: /app
        read_only: true
    environment:
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface/sentence-transformers
      - HF_HUB_CACHE=/models/huggingface/hub
    env_file:
      - ./.envs/.production/.rag
      - ./.envs/.production/.postgres
      - ./.envs/.production/.qdrant
      - ./.envs/.production/.redis
      - ./.envs/.production/.neo4j
    ports:
      - "1000:1000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "1000", "--workers", "1"]
    networks:
      rag_network:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 12G
        reservations:
          cpus: "2"
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "7"

  # ============================================================================
  # PostgreSQL 15 Database (Relational Metadata fallback)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres_rag_prod
    restart: unless-stopped
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rag_password}
      - POSTGRES_DB=${POSTGRES_DB:-rag_db}
    env_file:
      - ./.envs/.production/.postgres
    ports:
      - "5432:5432"
    networks:
      rag_network:
        ipv4_address: 172.28.0.30
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag_user} -d ${POSTGRES_DB:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # ============================================================================
  # Qdrant Vector Database
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_rag_prod
    restart: unless-stopped
    volumes:
      - prod_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      rag_network:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # Redis 7 — Semantic Cache + Job Queue
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis_rag_prod
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-mysecurepassword}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 300 100
      --appendonly yes
      --appendfsync everysec
    volumes:
      - prod_redis_data:/data
    env_file:
      - ./.envs/.production/.redis
    ports:
      - "6379:6379"
    networks:
      rag_network:
        ipv4_address: 172.28.0.30
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mysecurepassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # Ollama — Local LLM Server (GPU-Accelerated)
  # ============================================================================
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama_rag_prod
    restart: unless-stopped
    environment:
      - OLLAMA_CONTEXT_LENGTH=16384
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_QUEUE=128
    volumes:
      - prod_ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      rag_network:
        ipv4_address: 172.28.0.40
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 14G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # Model Pre-Loader (runs once, exits)
  # ============================================================================
  models:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_prod:latest
    pull_policy: if_not_present
    container_name: itips_rag_prod_models
    user: root
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - prod_ollama_data:/root/.ollama
      - type: bind
        source: ./
        target: /app
        read_only: true
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface/sentence-transformers
      - HF_HUB_CACHE=/models/huggingface/hub
    env_file:
      - ./.envs/.production/.rag
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        echo "=== Restoring baked-in Ollama model to shared volume ==="
        mkdir -p /root/.ollama/models/blobs /root/.ollama/models/manifests
        cp -rn /models/ollama/blobs/* /root/.ollama/models/blobs/ 2>/dev/null || true
        cp -rn /models/ollama/manifests/* /root/.ollama/models/manifests/ 2>/dev/null || true
        echo "=== Ensuring Ollama pulls the active model over network ==="
        curl -s -X POST http://ollama:11434/api/pull -d "{\"name\": \"$${OLLAMA_MODEL}\", \"stream\": false}"
        echo "=== Models ready ==="
    networks:
      rag_network:
        ipv4_address: 172.28.0.50

  # ============================================================================
  # Neo4j — Knowledge Graph (Entity Relationships)
  # ============================================================================
  neo4j:
    image: neo4j:5.17.0
    container_name: neo4j_rag_prod
    restart: unless-stopped
    volumes:
      - prod_neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-rag_password}
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_memory_heap_max__size=4G
      - NEO4J_server_memory_heap_initial__size=1G
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      rag_network:
        ipv4_address: 172.28.0.60
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-rag_password}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # Automated Backup Service
  # ============================================================================
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_prod:latest
    pull_policy: if_not_present
    container_name: itips_rag_prod_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - prod_backup_data:/backup
      - type: bind
        source: ./scripts/backup
        target: /scripts/backup
        read_only: true
    environment:
      - PGHOST=postgres
      - PGUSER=${POSTGRES_USER:-rag_user}
      - PGPASSWORD=${POSTGRES_PASSWORD:-rag_password}
      - PGDATABASE=${POSTGRES_DB:-rag_db}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-rag_password}
      - BACKUP_DIR=/backup
      - RETENTION_DAYS=30
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        echo "Backup service started. Running daily at 02:00."
        while true; do
          current_hour=$$(date +%H)
          current_min=$$(date +%M)
          if [ "$$current_hour" = "02" ] && [ "$$current_min" = "00" ]; then
            /scripts/backup/run.sh >> /var/log/rag/backup.log 2>&1
            sleep 60
          fi
          sleep 30
        done
    networks:
      rag_network: {}