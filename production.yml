volumes:
  prod_ollama_data: {}
  prod_huggingface_cache: {}

services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_prod
    container_name: itips_rag_prod
    depends_on:
      - ollama
    volumes:
      - .:/app:z
      - /your/new/absolute/path/to/external_media:/media
      - prod_huggingface_cache:/models/huggingface
    environment:
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface/sentence-transformers
      - HF_HUB_CACHE=/models/huggingface/hub
    ports:
      - "1000:1000"
    env_file:
      - ./.envs/.production/.rag
      - ./.envs/.production/.postgres
      - ./.envs/.production/.redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: uvicorn app.main:app --host 0.0.0.0 --port 1000 --workers 4

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_rag_prod
    volumes:
      - prod_ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama_rag_prod_pull
    depends_on:
      - ollama
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - .:/app:ro
    command: -c "sleep 10 && (ollama pull llama3 || echo 'Pull skipped - using cached model') && ollama create itips-brain -f /app/Modelfile && echo ' itips-brain ready'"
