version: '3.8'

volumes:
  prod_redis_data: {}
  prod_ollama_data: {}

services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_prod
    container_name: itips_rag_prod
    depends_on:
      - redis
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - .:/app:z
      - /your/new/absolute/path/to/external_media:/media
    ports:
      - "1000:1000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://prod_user:prod_pass@external_db_host:5432/prod_db}
      - REDIS_URL=redis://redis:6379/0
      - MEDIA_PATH=/media
      - USE_GPU=true
      - OLLAMA_URL=http://ollama:11434/api/generate
    command: uvicorn app.main:app --host 0.0.0.0 --port 1000 --workers 4

  redis:
    image: redis:6-alpine
    container_name: redis_rag_prod
    volumes:
      - prod_redis_data:/data:z
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_rag_prod
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - prod_ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama_rag_prod_pull
    depends_on:
      - ollama
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: -c "sleep 10 && ollama pull llama3"
