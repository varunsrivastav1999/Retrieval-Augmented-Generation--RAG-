volumes:
  local_postgres_data: {}
  local_qdrant_data: {}
  local_redis_data: {}
  local_ollama_data: {}
  local_neo4j_data: {}
  local_media: {}
services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_local
    container_name: itips_rag_local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      pull-models:
        condition: service_completed_successfully
    volumes:
      - .:/app:z
      - local_media:/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface/sentence-transformers
      - HF_HUB_CACHE=/models/huggingface/hub
    expose:
      - "1000:1000"
    env_file:
      - ./.envs/.local/.rag
      - ./.envs/.local/.postgres
      - ./.envs/.local/.qdrant
      - ./.envs/.local/.redis
      - ./.envs/.local/.neo4j
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: uvicorn app.main:app --host 0.0.0.0 --port 1000 --reload --log-level debug
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
  postgres:
    image: postgres:15-alpine
    container_name: postgres_rag_local
    restart: unless-stopped
    volumes:
      - local_postgres_data:/var/lib/postgresql/data:z
    environment:
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
      - POSTGRES_DB=rag_db
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_rag_local
    restart: unless-stopped
    volumes:
      - local_qdrant_data:/qdrant/storage:z
    expose:
      - "6333"
  redis:
    image: redis:7-alpine
    container_name: redis_rag_local
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - local_redis_data:/data:z
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama_rag_local
    restart: unless-stopped
    environment:
      - OLLAMA_CONTEXT_LENGTH=8192
    volumes:
      - local_ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
  neo4j:
    image: neo4j:5.17.0
    container_name: neo4j_rag_local
    restart: unless-stopped
    volumes:
      - local_neo4j_data:/data:z
    environment:
      - NEO4J_AUTH=neo4j/rag_password
    expose:
      - "7474"
      - "7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "rag_password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  pull-models:
    image: ollama/ollama:0.3.14
    container_name: ollama_rag_local_pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - local_ollama_data:/root/.ollama
      - .:/app:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "=== Pulling Ollama model: ${OLLAMA_MODEL:-qwen2.5:7b} ==="
        ollama pull ${OLLAMA_MODEL:-qwen2.5:7b} || echo "Pull skipped (already exists)"
        echo "=== Skipping Modelfile (using pulled model: ${OLLAMA_MODEL:-qwen2.5:7b}) ==="
        echo "=== Models ready ==="