volumes:
  local_pgvector_data: {}
  local_redis_data: {}
  local_huggingface_cache: {}
  local_ollama_data: {}

services:
  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    image: itips_rag_local
    container_name: itips_rag_local
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - .:/app:z
      - /Users/tei-1358/Documents/i-Tips Projects/TM-2000_TVS/Dev/external_media:/media
      - local_huggingface_cache:/models/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/huggingface/sentence-transformers
      - HF_HUB_CACHE=/models/huggingface/hub
    ports:
      - "1000:1000"
    env_file:
      - ./.envs/.local/.rag
      - ./.envs/.local/.postgres
      - ./.envs/.local/.redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 1000 --reload

  postgres:
    image: pgvector/pgvector:pg15
    container_name: postgres_pgvector_local
    volumes:
      - local_pgvector_data:/var/lib/postgresql/data:z
    environment:
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"

  redis:
    image: redis:6-alpine
    container_name: redis_rag_local
    volumes:
      - local_redis_data:/data:z
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_rag_local
    volumes:
      - local_ollama_data:/root/.ollama
      - .:/app:ro
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  pull-models:
    image: ollama/ollama:latest
    container_name: ollama_rag_local_pull
    volumes:
      - local_ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama
    entrypoint: /bin/sh
    command: -c "sleep 5 && ollama pull llama3"
    depends_on:
      ollama:
        condition: service_healthy
